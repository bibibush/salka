# =============================================================================
# (D) 백엔드 CD — Docker 이미지 빌드 → SSH 자체 서버 배포 [R5-CD1]
# -----------------------------------------------------------------------------
# apps/api(Dockerfile)를 이미지로 빌드해 GHCR(GitHub Container Registry)에 push 한 뒤,
# 자체 서버(<host>)에 SSH 로 접속해 새 이미지를 pull/run 한다.
# CI 와 동일하게 모노레포 경로 기반 선택 실행을 적용한다:
#   - apps/api 변경 또는 shared(루트 파일·packages/**) 변경 시에만 배포한다.
#   - 그 외 변경(예: apps/web 만 변경)에는 아무것도 하지 않는다.
#
# 트리거: prod 브랜치 push + 수동 실행(workflow_dispatch).
#   - push  : 경로 diff 로 배포 여부를 결정한다.
#   - manual: diff 기준이 없으므로 항상 배포한다.
#
# -----------------------------------------------------------------------------
# 사용자가 GitHub 에 사전 등록해야 하는 값 (실제 값은 여기 커밋하지 않는다):
#   [Secrets]
#     DEPLOY_SSH_HOST   배포 대상 서버 호스트(IP 또는 도메인)
#     DEPLOY_SSH_USER   SSH 로그인 사용자
#     DEPLOY_SSH_KEY    SSH 개인키(PEM). known_hosts 없이도 접속하도록 사용.
#   [Variables]
#     DEPLOY_SSH_PORT   SSH 포트(미설정 시 22)
#     API_ENV_FILE      서버에 미리 둔 런타임 env-file 경로
#                       (미설정 시 /opt/cosmetics-analyzer/api.env)
#                       LLM_API_KEY/OCR_API_KEY 등 실제 런타임 시크릿은 이 서버
#                       파일로만 주입하고 저장소/워크플로에 두지 않는다.
# GHCR push/pull 은 워크플로 실행 동안 유효한 GITHUB_TOKEN 으로 인증하므로
# 별도 레지스트리 시크릿이 필요 없다.
# 로컬에서는 apps/api/.env(.example) 에 위 값들을 <...> 플레이스홀더로 문서화한다.
# =============================================================================
name: API CD (Docker + SSH)

on:
  push:
    branches: [prod]
  workflow_dispatch:

concurrency:
  group: api-cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # push 시에만 경로 diff 로 배포 대상 여부를 판단한다.
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changes
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      api: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/api-cd.yml'

  deploy:
    name: Build image & deploy over SSH
    needs: changes
    if: >-
      ${{ always() &&
          (github.event_name == 'workflow_dispatch' ||
           needs.changes.outputs.api == 'true') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # GHCR 이미지 경로는 소문자여야 하므로 repository 를 소문자로 변환한다.
      - name: Resolve image reference
        id: image
        run: echo "ref=ghcr.io/${GITHUB_REPOSITORY,,}/api:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.ref }}
            ghcr.io/${{ github.repository_owner }}/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 자체 서버에 SSH 로 접속해 새 이미지를 pull/run 한다.
      # GHCR pull 인증은 실행 동안 유효한 GITHUB_TOKEN 으로 서버에서 로그인해 처리한다.
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ vars.DEPLOY_SSH_PORT || 22 }}
          envs: IMAGE_REF,GHCR_USER,GHCR_TOKEN,API_ENV_FILE
          script: |
            set -euo pipefail
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker pull "$IMAGE_REF"
            docker stop cosmetics-api 2>/dev/null || true
            docker rm cosmetics-api 2>/dev/null || true
            docker run -d \
              --name cosmetics-api \
              --restart unless-stopped \
              -p 8000:8000 \
              --env-file "$API_ENV_FILE" \
              "$IMAGE_REF"
            docker image prune -f
        env:
          IMAGE_REF: ${{ steps.image.outputs.ref }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          API_ENV_FILE: ${{ vars.API_ENV_FILE || '/opt/cosmetics-analyzer/api.env' }}

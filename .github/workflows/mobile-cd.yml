# =============================================================================
# (B) 모바일 CD — EAS [R5-CD2]
# -----------------------------------------------------------------------------
# main push + 수동 실행(workflow_dispatch) 두 트리거를 지원한다. 모바일 관련
# 변경이 있으면 네이티브 변경 여부에 따라 분기:
#   - 네이티브 변경 O → eas build + submit (스토어, 심사 경로)
#   - 네이티브 변경 X → eas update       (OTA, JS/에셋 즉시 배포)
#   - 모바일 무관 변경  → 아무것도 안 함
#
# 네이티브 변경 판단 파일(새 바이너리 필요):
#   apps/mobile/package.json, apps/mobile/app.json, apps/mobile/eas.json, pnpm-lock.yaml
#
# 수동 실행(workflow_dispatch) 시 mode 로 강제 지정 가능(auto/ota/build-submit).
# auto + 수동 실행은 안전하게 OTA 로 처리한다(수동 diff 기준 부재).
#
# -----------------------------------------------------------------------------
# [활성화(feature flag)] main push 배포는 Variable `MOBILE_CD_ENABLED == 'true'`
# 일 때만 실제로 동작한다. 플래그 미설정 시 push 는 action=none 으로 안전하게
# no-op 하므로, 자격증명/projectId 준비 전에도 main push 가 실패하지 않는다.
# 준비가 끝나면 이 변수만 켜면 활성화되고 워크플로 코드 변경은 불필요하다.
# (수동 workflow_dispatch 는 명시적 실행이므로 플래그와 무관하게 항상 동작한다.)
#
# 사용자가 GitHub 에 사전 등록해야 하는 값 (참조만):
#   [Secrets]   EXPO_TOKEN                (필수) Expo 액세스 토큰
#   [Variables] EXPO_PUBLIC_API_BASE_URL  프로덕션 백엔드 베이스 URL
#   [Variables] MOBILE_CD_ENABLED         'true' 로 두면 main push 배포 활성화
# 스토어 제출 자격증명(App Store Connect API Key / Google Play 서비스 계정 JSON)
# 및 코드사이닝은 EAS remote credentials(권장) 로 관리하며, `eas init`(projectId)
# 은 사용자가 최초 1회 수행해야 한다. 미설정 시 build/submit 은 실패한다.
# =============================================================================
name: Mobile CD (EAS)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: '배포 방식'
        type: choice
        default: auto
        options:
          - auto
          - ota
          - build-submit
      platform:
        description: 'build-submit 시 플랫폼'
        type: choice
        default: all
        options:
          - all
          - ios
          - android

concurrency:
  group: mobile-cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # push 시에만 경로 diff 로 모바일 영향/네이티브 변경 여부 감지.
  # (workflow_dispatch 는 diff 기준이 없어 이 job 을 건너뛴다.)
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changes
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      mobile_affected: ${{ steps.filter.outputs.mobile_affected }}
      native: ${{ steps.filter.outputs.native }}
    steps:
      - uses: actions/checkout@v7
      - id: filter
        uses: dorny/paths-filter@v4
        with:
          # push 트리거 활성화(R5-CD2) 시 직전 커밋 대비로 변경을 감지한다. base 미지정 시
          # 기본 브랜치 merge-base 기준이라, main push 에서 항상 "변경 없음"이 되어버린다.
          base: ${{ github.event.before }}
          filters: |
            mobile_affected:
              - 'apps/mobile/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
            native:
              - 'apps/mobile/package.json'
              - 'apps/mobile/app.json'
              - 'apps/mobile/eas.json'
              - 'pnpm-lock.yaml'

  # ---------------------------------------------------------------------------
  # 최종 동작 결정: build-submit | ota | none
  # ---------------------------------------------------------------------------
  decide:
    name: Decide action
    needs: changes
    if: ${{ always() }}
    runs-on: ubuntu-latest
    outputs:
      action: ${{ steps.d.outputs.action }}
    steps:
      - id: d
        run: |
          MODE="${{ github.event.inputs.mode || 'auto' }}"
          EVENT="${{ github.event_name }}"
          AFFECTED="${{ needs.changes.outputs.mobile_affected }}"
          NATIVE="${{ needs.changes.outputs.native }}"

          # [feature flag] main push 배포는 vars.MOBILE_CD_ENABLED == 'true' 일 때만 동작한다.
          # 자격증명/projectId 준비 전에는 플래그 미설정 → action=none 으로 안전하게 no-op
          # (main push 가 실패하지 않는다). 수동 실행(workflow_dispatch)은 플래그와 무관하다.
          if [ "$EVENT" = "push" ] && [ "${{ vars.MOBILE_CD_ENABLED }}" != "true" ]; then
            echo "action=none" >> "$GITHUB_OUTPUT"; exit 0;
          fi

          if [ "$MODE" = "build-submit" ]; then echo "action=build-submit" >> "$GITHUB_OUTPUT"; exit 0; fi
          if [ "$MODE" = "ota" ]; then echo "action=ota" >> "$GITHUB_OUTPUT"; exit 0; fi

          # 이하 auto
          if [ "$EVENT" = "workflow_dispatch" ]; then echo "action=ota" >> "$GITHUB_OUTPUT"; exit 0; fi
          if [ "$AFFECTED" != "true" ]; then echo "action=none" >> "$GITHUB_OUTPUT"; exit 0; fi
          if [ "$NATIVE" = "true" ]; then
            echo "action=build-submit" >> "$GITHUB_OUTPUT"
          else
            echo "action=ota" >> "$GITHUB_OUTPUT"
          fi

      - name: Summary
        run: echo "Resolved action = ${{ steps.d.outputs.action }}"

  # ---------------------------------------------------------------------------
  # 네이티브 변경 → 스토어 빌드/제출
  # ---------------------------------------------------------------------------
  build-submit:
    name: EAS build + submit
    needs: decide
    if: ${{ needs.decide.outputs.action == 'build-submit' }}
    runs-on: ubuntu-latest
    env:
      EAS_PLATFORM: ${{ github.event.inputs.platform || 'all' }}
      EXPO_PUBLIC_API_BASE_URL: ${{ vars.EXPO_PUBLIC_API_BASE_URL }}
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: EAS build (production)
        working-directory: apps/mobile
        run: eas build --platform ${{ env.EAS_PLATFORM }} --profile production --non-interactive
      - name: EAS submit (production)
        working-directory: apps/mobile
        run: eas submit --platform ${{ env.EAS_PLATFORM }} --profile production --latest --non-interactive

  # ---------------------------------------------------------------------------
  # 네이티브 미변경 → OTA 업데이트
  # ---------------------------------------------------------------------------
  ota:
    name: EAS update (OTA)
    needs: decide
    if: ${{ needs.decide.outputs.action == 'ota' }}
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_API_BASE_URL: ${{ vars.EXPO_PUBLIC_API_BASE_URL }}
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: EAS update
        working-directory: apps/mobile
        run: eas update --branch production --auto --non-interactive
